<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Task Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-layout">
    <article class="todo-card" data-testid="test-todo-card" aria-labelledby="todo-title" role="region">
      <div class="todo-card__header">
        <div class="todo-card__status-row">
          <span class="todo-badge todo-badge--priority" data-testid="test-todo-priority" aria-label="Priority: High">High</span>
          <span class="todo-badge todo-badge--status" data-testid="test-todo-status">In Progress</span>
        </div>
        <div class="todo-card__actions">
          <button type="button" class="icon-button" data-testid="test-todo-edit-button" aria-label="Edit task">Edit</button>
          <button type="button" class="icon-button icon-button--danger" data-testid="test-todo-delete-button" aria-label="Delete task">Delete</button>
        </div>
      </div>

      <h2 id="todo-title" class="todo-card__title" data-testid="test-todo-title">Design homepage hero section</h2>
      <p class="todo-card__description" data-testid="test-todo-description">
        Create an engaging hero section with a strong call to action and a concise feature summary for the new marketing homepage.
      </p>

      <div class="todo-card__meta">
        <div class="todo-card__date-block">
          <strong>Due Date:</strong>
          <time class="todo-card__due-date" data-testid="test-todo-due-date" datetime="" aria-label="Task due date"></time>
        </div>
        <div class="todo-card__time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"></div>
      </div>

      <div class="todo-card__complete-row">
        <div class="checkbox-wrapper">
          <input id="complete-toggle" type="checkbox" data-testid="test-todo-complete-toggle" />
          <label for="complete-toggle">Mark task complete</label>
        </div>
      </div>

      <div class="todo-card__tags" data-testid="test-todo-tags" role="list" aria-label="Task tags">
        <span class="tag-pill" role="listitem" data-testid="test-todo-tag-work">Work</span>
        <span class="tag-pill tag-pill--urgent" role="listitem" data-testid="test-todo-tag-urgent">Urgent</span>
        <span class="tag-pill" role="listitem">Design</span>
      </div>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
